<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 ダッシュボード | スライムもりもりバトル</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1a; --panel: #12122a; --border: #2a2a5a;
      --gold: #ffd700; --accent: #7b2fff; --accent2: #00e5ff;
      --text: #e0e0ff; --slime: #4cff72; --danger: #ff5555; --warn: #ffaa00;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'M PLUS Rounded 1c', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 20%, rgba(123,47,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 50%, rgba(0,229,255,0.3) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ヘッダー */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; animation: fadeDown 0.5s ease both; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { font-size: 36px; }
    .header-title { font-family: 'Press Start 2P', monospace; font-size: clamp(10px, 2.5vw, 14px); color: var(--accent2); text-shadow: 0 0 10px rgba(0,229,255,0.5); line-height: 1.6; }
    .header-sub { font-size: 11px; color: rgba(224,224,255,0.4); margin-top: 4px; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 12px; border-radius: 6px; text-decoration: none; border: 2px solid var(--border); color: var(--text); background: var(--panel); transition: all 0.2s; white-space: nowrap; }
    .nav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .nav-btn.primary { border-color: var(--slime); color: var(--slime); }

    /* 管理者ログインパネル */
    .admin-panel { background: var(--panel); border: 2px solid #3a1a5a; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; animation: fadeUp 0.5s ease both; box-shadow: 0 0 20px rgba(123,47,255,0.15); }
    .admin-panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .admin-label { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--warn); letter-spacing: 1px; }
    .admin-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .admin-input { background: #0a0a1a; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'M PLUS Rounded 1c', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.2s; width: 130px; }
    .admin-input:focus { border-color: var(--accent); }
    .admin-input[type="password"] { letter-spacing: 2px; }
    .btn-admin-login { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 14px; border-radius: 6px; border: 2px solid var(--accent); color: var(--accent); background: transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-admin-login:hover { background: rgba(123,47,255,0.15); }
    .btn-admin-logout { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 14px; border-radius: 6px; border: 2px solid var(--danger); color: var(--danger); background: transparent; cursor: pointer; transition: all 0.2s; }
    .btn-admin-logout:hover { background: rgba(255,85,85,0.1); }
    .admin-status { font-size: 12px; margin-top: 10px; padding: 6px 12px; border-radius: 6px; display: none; }
    .admin-status.success { background: rgba(76,255,114,0.1); color: var(--slime); border: 1px solid rgba(76,255,114,0.3); display: block; }
    .admin-status.error { background: rgba(255,85,85,0.1); color: var(--danger); border: 1px solid rgba(255,85,85,0.3); display: block; }
    .admin-status.info { background: rgba(0,229,255,0.08); color: var(--accent2); border: 1px solid rgba(0,229,255,0.3); display: block; }

    /* ローディング */
    .loading { text-align: center; padding: 80px 20px; }
    .loading-slime { font-size: 48px; display: block; animation: pulse 0.8s ease-in-out infinite alternate; }
    .loading p { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent2); margin-top: 16px; letter-spacing: 2px; }
    .error-msg { text-align: center; padding: 60px 20px; font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--danger); line-height: 2.5; }

    /* スタットカード */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; animation: fadeUp 0.6s ease both; }
    .stat-card { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; padding: 20px 16px; text-align: center; transition: border-color 0.2s, transform 0.2s; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-icon { font-size: 28px; margin-bottom: 10px; display: block; }
    .stat-value { font-family: 'Press Start 2P', monospace; font-size: clamp(16px, 4vw, 24px); color: var(--slime); text-shadow: 0 0 10px rgba(76,255,114,0.4); display: block; }
    .stat-label { font-size: 11px; color: rgba(224,224,255,0.5); margin-top: 6px; letter-spacing: 1px; }

    /* パネル共通 */
    .panel { background: var(--panel); border: 2px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 0 30px rgba(123,47,255,0.1); animation: fadeUp 0.7s ease both; }
    .panel-header { background: linear-gradient(135deg, #1a1a3a, #0f0f28); border-bottom: 2px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .panel-header-left { display: flex; align-items: center; gap: 8px; }
    .panel-header span { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent2); letter-spacing: 2px; }

    /* ソートボタン */
    .sort-btns { display: flex; gap: 6px; }
    .btn-sort { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 5px 10px; border-radius: 5px; border: 2px solid var(--border); color: rgba(224,224,255,0.5); background: transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-sort:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-sort.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,229,255,0.1); }

    /* 称号分布 */
    .title-list { padding: 12px 0; }
    .title-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(42,42,90,0.4); }
    .title-item:last-child { border-bottom: none; }
    .title-name { font-size: 14px; font-weight: 700; color: #fff; width: 100px; flex-shrink: 0; }
    .title-bar-wrap { flex: 1; height: 12px; background: rgba(42,42,90,0.6); border-radius: 6px; overflow: hidden; }
    .title-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s ease; }
    .title-count { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent2); width: 40px; text-align: right; flex-shrink: 0; }

    /* プレイヤー一覧 */
    .player-list { padding: 8px 0; }
    .player-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; border-bottom: 1px solid rgba(42,42,90,0.4); animation: slideIn 0.4s ease both; }
    .player-item:last-child { border-bottom: none; }
    .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-title-badge { display: inline-block; font-size: 10px; color: var(--accent2); background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 4px; padding: 1px 6px; margin-top: 3px; }
    .player-score { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--slime); text-align: right; flex-shrink: 0; }
    .player-score span { display: block; font-size: 8px; color: rgba(76,255,114,0.5); margin-top: 3px; }
    .player-id { font-size: 10px; color: rgba(224,224,255,0.3); margin-top: 2px; }

    /* 削除ボタン */
    .btn-delete { display: none; font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 10px; border-radius: 6px; border: 2px solid var(--danger); color: var(--danger); background: transparent; cursor: pointer; transition: all 0.2s; flex-shrink: 0; white-space: nowrap; }
    .btn-delete:hover { background: rgba(255,85,85,0.15); transform: scale(1.05); }
    .btn-delete:active { transform: scale(0.97); }
    body.admin-mode .btn-delete { display: block; }

    /* ページネーション */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 16px 20px; border-top: 1px solid rgba(42,42,90,0.4); flex-wrap: wrap; }
    .btn-page { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 7px 11px; border-radius: 6px; border: 2px solid var(--border); color: rgba(224,224,255,0.6); background: transparent; cursor: pointer; transition: all 0.2s; min-width: 34px; text-align: center; }
    .btn-page:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
    .btn-page.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,229,255,0.12); }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 11px; color: rgba(224,224,255,0.4); letter-spacing: 1px; padding: 0 6px; }

    /* 削除確認モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--panel); border: 2px solid var(--danger); border-radius: 16px; padding: 32px 28px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 0 40px rgba(255,85,85,0.3); animation: fadeUp 0.2s ease both; }
    .modal-icon { font-size: 40px; margin-bottom: 16px; }
    .modal-title { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--danger); margin-bottom: 12px; }
    .modal-body { font-size: 14px; color: var(--text); line-height: 1.7; margin-bottom: 24px; }
    .modal-body strong { color: #fff; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .btn-confirm-delete { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 10px 20px; border-radius: 8px; border: 2px solid var(--danger); color: #fff; background: var(--danger); cursor: pointer; transition: all 0.2s; }
    .btn-confirm-delete:hover { background: #cc3333; }
    .btn-cancel { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 10px 20px; border-radius: 8px; border: 2px solid var(--border); color: var(--text); background: transparent; cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--accent2); color: var(--accent2); }

    /* フッター */
    .footer { text-align: center; margin-top: 24px; font-size: 11px; color: rgba(224,224,255,0.3); animation: fadeUp 0.9s ease both; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-left">
        <div class="header-icon">📊</div>
        <div>
          <div class="header-title">DASHBOARD</div>
          <div class="header-sub">スライムもりもりバトル</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="ranking.html" class="nav-btn">🏆 ランキング</a>
        <a href="index.html" class="nav-btn primary">▶ ゲーム</a>
      </div>
    </div>

    <!-- 管理者ログインパネル -->
    <div class="admin-panel">
      <div class="admin-panel-header">
        <span class="admin-label">🔑 管理者モード</span>
        <div id="admin-form-area">
          <div class="admin-form">
            <input class="admin-input" type="text" id="admin-user" placeholder="ユーザー名" autocomplete="username">
            <input class="admin-input" type="password" id="admin-pass" placeholder="パスワード" autocomplete="current-password">
            <button class="btn-admin-login" onclick="adminLogin()">ログイン</button>
          </div>
        </div>
        <div id="admin-logout-area" style="display:none">
          <button class="btn-admin-logout" onclick="adminLogout()">🔓 ログアウト</button>
        </div>
      </div>
      <div id="admin-status" class="admin-status"></div>
    </div>

    <div id="main">
      <div class="loading">
        <span class="loading-slime">🟢</span>
        <p>LOADING...</p>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">DELETE CONFIRM</div>
      <div class="modal-body" id="modal-body">このデータを削除しますか？</div>
      <div class="modal-buttons">
        <button class="btn-confirm-delete" onclick="confirmDelete()">🗑 削除する</button>
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://popgame-backend.onrender.com/api/scores';
    const PAGE_SIZE = 20; // 1ページあたりの表示件数

    let adminCredentials = null;
    let pendingDeleteId = null;
    let pendingDeleteName = null;
    let isDeleting = false; // 削除処理中フラグ（連打防止）

    // 表示状態
    let currentSort = 'score'; // 'score' | 'date'
    let currentPage = 1;
    let displayData = []; // 重複排除・ソート済みの表示用データ

    /* ===== ユーティリティ ===== */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getInitial(name) {
      return name ? name.charAt(0).toUpperCase() : '?';
    }

    /* ===== 管理者ログイン ===== */
    async function adminLogin() {
      const user = document.getElementById('admin-user').value.trim();
      const pass = document.getElementById('admin-pass').value;
      if (!user || !pass) {
        showAdminStatus('ユーザー名とパスワードを入力してください', 'error');
        return;
      }

      const encoded = btoa(unescape(encodeURIComponent(`${user}:${pass}`)));
      const header = `Basic ${encoded}`;

      const loginBtn = document.querySelector('.btn-admin-login');
      loginBtn.disabled = true;
      showAdminStatus('🔄 認証中...', 'info');
      try {
        const res = await fetch('https://popgame-backend.onrender.com/api/admin/check', {
          method: 'GET',
          headers: { 'Authorization': header }
        });

        if (res.ok) {
          adminCredentials = { username: user, password: pass, header };
          document.body.classList.add('admin-mode');
          document.getElementById('admin-form-area').style.display = 'none';
          document.getElementById('admin-logout-area').style.display = 'block';
          document.getElementById('admin-pass').value = '';
          showAdminStatus(`✅ 管理者モードで接続中: ${escapeHtml(user)}`, 'success');
          renderPlayerList(); // 削除ボタンを表示するため再描画
        } else if (res.status === 401 || res.status === 403) {
          showAdminStatus('❌ ユーザー名またはパスワードが違います', 'error');
        } else {
          showAdminStatus(`❌ サーバーエラー（HTTP ${res.status}）`, 'error');
        }
      } catch (e) {
        console.error('adminLogin error:', e);
        showAdminStatus('❌ 通信エラーが発生しました', 'error');
      } finally {
        loginBtn.disabled = false;
      }
    }

    function adminLogout() {
      adminCredentials = null;
      document.body.classList.remove('admin-mode');
      document.getElementById('admin-form-area').style.display = 'block';
      document.getElementById('admin-logout-area').style.display = 'none';
      document.getElementById('admin-user').value = '';
      showAdminStatus('', '');
    }

    function showAdminStatus(msg, type) {
      const el = document.getElementById('admin-status');
      el.textContent = msg;
      el.className = 'admin-status' + (type ? ' ' + type : '');
    }

    // Enterキーでログイン
    document.addEventListener('DOMContentLoaded', () => {
      ['admin-user', 'admin-pass'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') adminLogin();
        });
      });
    });

    /* ===== 削除モーダル ===== */
    function openDeleteModal(id, name) {
      pendingDeleteId = id;
      pendingDeleteName = name;
      document.getElementById('modal-body').innerHTML =
        `<strong>${escapeHtml(name)}</strong> のデータ（ID: ${id}）を<br>削除しますか？<br><br>この操作は取り消せません。`;
      document.getElementById('delete-modal').classList.add('open');
    }

    function closeModal() {
      pendingDeleteId = null;
      pendingDeleteName = null;
      document.getElementById('delete-modal').classList.remove('open');
    }

    async function confirmDelete() {
      if (pendingDeleteId === null || pendingDeleteId === undefined || !adminCredentials) return;
      if (isDeleting) return; // 連打防止

      const id = pendingDeleteId;
      isDeleting = true;
      closeModal();

      try {
        const res = await fetch(`${API_URL}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': adminCredentials.header }
        });

        if (res.status === 204 || res.ok) {
          showAdminStatus(`🗑 ID:${id} を削除しました`, 'success');
          await loadDashboard();
        } else if (res.status === 401 || res.status === 403) {
          showAdminStatus(`❌ 権限エラー（HTTP ${res.status}）。認証情報を確認してください。`, 'error');
        } else {
          showAdminStatus(`❌ 削除に失敗しました（HTTP ${res.status}）`, 'error');
        }
      } catch (e) {
        console.error('confirmDelete error:', e);
        showAdminStatus('❌ 通信エラーが発生しました', 'error');
      } finally {
        isDeleting = false;
      }
    }

    document.getElementById('delete-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    /* ===== 重複排除（ranking.htmlと同じロジック） ===== */
    function deduplicateByBestScore(data) {
      const bestMap = new Map();
      for (const item of data) {
        const existing = bestMap.get(item.playerName);
        if (!existing || item.score > existing.score) {
          bestMap.set(item.playerName, item);
        }
      }
      return Array.from(bestMap.values());
    }

    /* ===== ソート ===== */
    function sortData(data, sortType) {
      const copy = [...data];
      if (sortType === 'score') {
        return copy.sort((a, b) => b.score - a.score);
      } else {
        // 登録日順（id降順。idがない場合はそのまま）
        return copy.sort((a, b) => (b.id || 0) - (a.id || 0));
      }
    }

    function changeSort(sortType) {
      if (currentSort === sortType) return;
      currentSort = sortType;
      currentPage = 1;
      document.getElementById('btn-sort-score').classList.toggle('active', sortType === 'score');
      document.getElementById('btn-sort-date').classList.toggle('active', sortType === 'date');
      displayData = sortData(displayData, currentSort);
      renderPlayerList();
    }

    /* ===== ページネーション ===== */
    function renderPlayerList() {
      const total = displayData.length;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = displayData.slice(start, start + PAGE_SIZE);

      const listEl = document.getElementById('player-list-body');
      const paginationEl = document.getElementById('pagination');
      if (!listEl || !paginationEl) return;

      // データが0件のとき空メッセージ（先にチェック）
      if (total === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:40px;font-size:12px;color:rgba(224,224,255,0.3)">データがありません</div>';
        paginationEl.innerHTML = '';
        return;
      }

      // プレイヤー行
      listEl.innerHTML = pageItems.map((p, i) => `
        <div class="player-item" style="animation-delay:${i*0.04}s" id="row-${p.id}">
          <div class="player-avatar">${escapeHtml(getInitial(p.playerName))}</div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(p.playerName)}</div>
            <span class="player-title-badge">${escapeHtml(p.title || '冒険者')}</span>
            <div class="player-id">ID: ${p.id}</div>
          </div>
          <div class="player-score">
            ${p.score.toLocaleString()}
            <span>POINTS</span>
          </div>
          <button class="btn-delete"
            data-id="${p.id}"
            data-name="${escapeHtml(p.playerName)}"
            onclick="openDeleteModal(this.dataset.id, this.dataset.name)">
            🗑 削除
          </button>
        </div>
      `).join('');

      // ページネーション（1ページのみなら非表示）
      if (totalPages <= 1) {
        paginationEl.innerHTML = '';
        return;
      }

      const MAX_VISIBLE = 5;
      let pages = [];
      if (totalPages <= MAX_VISIBLE + 2) {
        pages = Array.from({ length: totalPages }, (_, i) => i + 1);
      } else {
        pages = [1];
        let start = Math.max(2, currentPage - 1);
        let end = Math.min(totalPages - 1, currentPage + 1);
        if (currentPage <= 3) { start = 2; end = Math.min(totalPages - 1, MAX_VISIBLE); }
        if (currentPage >= totalPages - 2) { start = Math.max(2, totalPages - MAX_VISIBLE + 1); end = totalPages - 1; }
        if (start > 2) pages.push('...');
        for (let i = start; i <= end; i++) pages.push(i);
        if (end < totalPages - 1) pages.push('...');
        pages.push(totalPages);
      }

      paginationEl.innerHTML = `
        <button class="btn-page" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>
        ${pages.map(p => p === '...'
          ? `<span class="page-info">…</span>`
          : `<button class="btn-page ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`
        ).join('')}
        <button class="btn-page" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>
        <span class="page-info">${(currentPage - 1) * PAGE_SIZE + 1}–${Math.min(currentPage * PAGE_SIZE, total)} / ${total}件</span>
      `;
    }

    function goPage(page) {
      const totalPages = Math.max(1, Math.ceil(displayData.length / PAGE_SIZE));
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderPlayerList();
      // パネル上部へスクロール
      document.getElementById('player-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ===== ダッシュボード読み込み ===== */
    async function loadDashboard() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('APIエラー');
        const rawData = await res.json();

        if (rawData.length === 0) {
          document.getElementById('main').innerHTML = `
            <div class="loading">
              <span class="loading-slime">🟢</span>
              <p style="color:#888">まだプレイヤーがいないよ！<br><br>最初のプレイヤーに<br>なろう！</p>
            </div>`;
          return;
        }

        // 統計は重複排除前の全データで計算
        const totalPlays = rawData.length;
        const allScores = rawData.map(d => d.score);
        const maxScore = Math.max(...allScores);
        const avgScore = Math.round(allScores.reduce((a, b) => a + b, 0) / allScores.length);

        // 重複排除（同名プレイヤーは最高スコアの1件のみ）
        const unique = deduplicateByBestScore(rawData);

        // 称号集計（重複排除後）
        const titleCount = {};
        unique.forEach(d => {
          const t = d.title || '冒険者';
          titleCount[t] = (titleCount[t] || 0) + 1;
        });
        const sortedTitles = Object.entries(titleCount).sort((a, b) => b[1] - a[1]);
        const maxTitleCount = sortedTitles[0][1];

        // 表示用データをソート
        displayData = sortData(unique, currentSort);
        currentPage = 1;

        // HTML構築
        document.getElementById('main').innerHTML = `
          <!-- スタットカード -->
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-icon">👥</span>
              <span class="stat-value">${totalPlays.toLocaleString()}</span>
              <div class="stat-label">総プレイ数</div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">🏆</span>
              <span class="stat-value">${maxScore.toLocaleString()}</span>
              <div class="stat-label">最高スコア</div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">📈</span>
              <span class="stat-value">${avgScore.toLocaleString()}</span>
              <div class="stat-label">平均スコア</div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">👤</span>
              <span class="stat-value">${unique.length.toLocaleString()}</span>
              <div class="stat-label">ユニークプレイヤー</div>
            </div>
          </div>

          <!-- 称号分布 -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-header-left"><span>🎖️ 称号分布</span></div>
            </div>
            <div class="title-list">
              ${sortedTitles.map(([title, count]) => `
                <div class="title-item">
                  <div class="title-name">${escapeHtml(title)}</div>
                  <div class="title-bar-wrap">
                    <div class="title-bar" style="width:${Math.round(count/maxTitleCount*100)}%"></div>
                  </div>
                  <div class="title-count">${count}人</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- プレイヤー一覧 -->
          <div class="panel" id="player-panel">
            <div class="panel-header">
              <div class="panel-header-left"><span>👾 スコア一覧（ユニーク）</span></div>
              <div class="sort-btns">
                <button class="btn-sort ${currentSort === 'score' ? 'active' : ''}" id="btn-sort-score" onclick="changeSort('score')">🏆 スコア順</button>
                <button class="btn-sort ${currentSort === 'date' ? 'active' : ''}" id="btn-sort-date" onclick="changeSort('date')">🕐 登録日順</button>
              </div>
            </div>
            <div class="player-list" id="player-list-body"></div>
            <div id="pagination" class="pagination"></div>
          </div>
        `;

        renderPlayerList();

        const now = new Date();
        document.getElementById('footer').textContent =
          `最終更新: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      } catch (e) {
        console.error('loadDashboard error:', e);
        document.getElementById('main').innerHTML = `
          <div class="loading">
            <p class="error-msg">データを取得できなかったよ...<br><br>しばらくしてからリロードしてね！</p>
          </div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
