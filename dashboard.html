<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 ダッシュボード | スライムもりもりバトル</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --border: #2a2a5a;
      --gold: #ffd700;
      --accent: #7b2fff;
      --accent2: #00e5ff;
      --text: #e0e0ff;
      --slime: #4cff72;
      --danger: #ff5555;
      --warn: #ffaa00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 20%, rgba(123,47,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 50%, rgba(0,229,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      animation: fadeDown 0.5s ease both;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 36px; }

    .header-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 14px);
      color: var(--accent2);
      text-shadow: 0 0 10px rgba(0,229,255,0.5);
      line-height: 1.6;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(224,224,255,0.4);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      border: 2px solid var(--border);
      color: var(--text);
      background: var(--panel);
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .nav-btn.primary {
      border-color: var(--slime);
      color: var(--slime);
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-slime {
      font-size: 48px;
      display: block;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    .loading p {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--accent2);
      margin-top: 16px;
      letter-spacing: 2px;
    }

    /* エラー */
    .error-msg {
      text-align: center;
      padding: 60px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--danger);
      line-height: 2.5;
    }

    /* スタットカード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
    }

    .stat-card {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .stat-icon { font-size: 28px; margin-bottom: 10px; display: block; }

    .stat-value {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4vw, 24px);
      color: var(--slime);
      text-shadow: 0 0 10px rgba(76,255,114,0.4);
      display: block;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(224,224,255,0.5);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* パネル共通 */
    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(123,47,255,0.1);
      animation: fadeUp 0.7s ease both;
    }

    .panel-header {
      background: linear-gradient(135deg, #1a1a3a, #0f0f28);
      border-bottom: 2px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header span {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--accent2);
      letter-spacing: 2px;
    }

    /* 称号分布 */
    .title-list { padding: 12px 0; }

    .title-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(42,42,90,0.4);
    }

    .title-item:last-child { border-bottom: none; }

    .title-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      width: 100px;
      flex-shrink: 0;
    }

    .title-bar-wrap {
      flex: 1;
      height: 12px;
      background: rgba(42,42,90,0.6);
      border-radius: 6px;
      overflow: hidden;
    }

    .title-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s ease;
    }

    .title-count {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--accent2);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    /* プレイヤー一覧 */
    .player-list { padding: 8px 0; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(42,42,90,0.4);
      animation: slideIn 0.4s ease both;
    }

    .player-item:last-child { border-bottom: none; }

    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .player-info { flex: 1; }

    .player-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .player-title-badge {
      display: inline-block;
      font-size: 10px;
      color: var(--accent2);
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 4px;
      padding: 1px 6px;
      margin-top: 3px;
    }

    .player-score {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--slime);
      text-align: right;
    }

    .player-score span {
      display: block;
      font-size: 8px;
      color: rgba(76,255,114,0.5);
      margin-top: 3px;
    }

    /* フッター */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(224,224,255,0.3);
      animation: fadeUp 0.9s ease both;
    }

    /* アニメーション */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.6; }
      to { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-left">
        <div class="header-icon">📊</div>
        <div>
          <div class="header-title">DASHBOARD</div>
          <div class="header-sub">スライムもりもりバトル</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="ranking.html" class="nav-btn">🏆 ランキング</a>
        <a href="index.html" class="nav-btn primary">▶ ゲーム</a>
      </div>
    </div>

    <div id="main">
      <div class="loading">
        <span class="loading-slime">🟢</span>
        <p>LOADING...</p>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

  <script>
    const API_URL = 'https://popgame-backend.onrender.com/api/scores';

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getInitial(name) {
      return name ? name.charAt(0).toUpperCase() : '?';
    }

    async function loadDashboard() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('APIエラー');
        const data = await res.json();

        if (data.length === 0) {
          document.getElementById('main').innerHTML = `
            <div class="loading">
              <span class="loading-slime">🟢</span>
              <p style="color:#888">まだプレイヤーがいないよ！<br><br>最初のプレイヤーに<br>なろう！</p>
            </div>`;
          return;
        }

        // 統計計算
        const total = data.length;
        const scores = data.map(d => d.score);
        const maxScore = Math.max(...scores);
        const avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);

        // 称号集計
        const titleCount = {};
        data.forEach(d => {
          const t = d.title || '冒険者';
          titleCount[t] = (titleCount[t] || 0) + 1;
        });
        const sortedTitles = Object.entries(titleCount).sort((a, b) => b[1] - a[1]);
        const maxTitleCount = sortedTitles[0][1];

        // スコア順ソート
        const sorted = [...data].sort((a, b) => b.score - a.score);

        // HTML構築
        document.getElementById('main').innerHTML = `
          <!-- スタットカード -->
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-icon">👥</span>
              <span class="stat-value">${total}</span>
              <div class="stat-label">総プレイ人数</div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">🏆</span>
              <span class="stat-value">${maxScore.toLocaleString()}</span>
              <div class="stat-label">最高スコア</div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">📈</span>
              <span class="stat-value">${avgScore.toLocaleString()}</span>
              <div class="stat-label">平均スコア</div>
            </div>
          </div>

          <!-- 称号分布 -->
          <div class="panel">
            <div class="panel-header"><span>🎖️ 称号分布</span></div>
            <div class="title-list">
              ${sortedTitles.map(([title, count]) => `
                <div class="title-item">
                  <div class="title-name">${escapeHtml(title)}</div>
                  <div class="title-bar-wrap">
                    <div class="title-bar" style="width:${Math.round(count/maxTitleCount*100)}%"></div>
                  </div>
                  <div class="title-count">${count}人</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- プレイヤー一覧 -->
          <div class="panel">
            <div class="panel-header"><span>👾 プレイヤー一覧（スコア順）</span></div>
            <div class="player-list">
              ${sorted.map((p, i) => `
                <div class="player-item" style="animation-delay:${i*0.06}s">
                  <div class="player-avatar">${escapeHtml(getInitial(p.playerName))}</div>
                  <div class="player-info">
                    <div class="player-name">${escapeHtml(p.playerName)}</div>
                    <span class="player-title-badge">${escapeHtml(p.title || '冒険者')}</span>
                  </div>
                  <div class="player-score">
                    ${p.score.toLocaleString()}
                    <span>POINTS</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        const now = new Date();
        document.getElementById('footer').textContent =
          `最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

      } catch (e) {
        document.getElementById('main').innerHTML = `
          <div class="loading">
            <p class="error-msg">データを取得できなかったよ...<br><br>しばらくしてからリロードしてね！</p>
          </div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
