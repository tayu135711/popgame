    <!-- React Component -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function TitleMenu({ onSelect, cursorIndex, allMainCleared, chapter3Unlocked, chapter4Unlocked, chapter5Unlocked }) {
            const baseItems = [
                { label: 'ゲーム開始',                        icon: '⚔️', highlight: true },
                { label: 'イベントステージ',                   icon: '🌟' },
                { label: 'デイリーミッション',                  icon: '📋' },
                { label: '図鑑',                              icon: '📖' },
                { label: 'アップグレード',                     icon: '🔧' },
                { label: '配合',                              icon: '⚗️' },
                { label: 'カスタマイズ',                       icon: '🎨' },
                { label: '設定',                              icon: '⚙️' },
            ];
            let menuItems = [...baseItems];
            const inserts = [];
            if (allMainCleared) inserts.push({ label: '第2章「ギアギアどきどき大作戦！」', icon: '✨', chapter: true });
            if (chapter3Unlocked) inserts.push({ label: '第3章「天門のスカイパレード」',   icon: '☁️', chapter: true });
            if (chapter4Unlocked) inserts.push({ label: '第4章「深淵のカオスゾーン」',    icon: '🌑', chapter: true });
            // ★バグ修正: 第5章メニュー項目が React UI に存在しなかった（タッチ操作で第5章に入れないバグ）
            if (chapter5Unlocked) inserts.push({ label: '第5章「原初の光と終焉の砲火」', icon: '🌟', chapter: true });
            if (inserts.length > 0) {
                menuItems = [baseItems[0], ...inserts, ...baseItems.slice(1)];
            }

            const [hovered, setHovered] = React.useState(null);

            return (
                <div style={{
                    position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
                    display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
                    alignItems: 'center', pointerEvents: 'auto',
                    paddingBottom: '4vh',
                }}>
                    <div style={{
                        display: 'flex', flexDirection: 'column', gap: '9px',
                        width: '82%', maxWidth: '360px',
                    }}>
                        {menuItems.map((item, index) => {
                            const isSelected = cursorIndex === index;
                            const isHov = hovered === index;
                            const isStart = index === 0 && item.highlight;
                            const isChapter = item.chapter;

                            let bg, border, shadow, textColor;
                            if (isStart) {
                                bg = isSelected || isHov
                                    ? 'linear-gradient(135deg, #FF8C00 0%, #FF4500 50%, #CC2200 100%)'
                                    : 'linear-gradient(135deg, #DD6600 0%, #CC3300 100%)';
                                border = isSelected ? '2px solid #FFD700' : '2px solid rgba(255,140,0,0.6)';
                                shadow = isSelected
                                    ? '0 0 22px rgba(255,120,0,0.9), 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2)'
                                    : '0 4px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1)';
                                textColor = '#FFF';
                            } else if (isChapter) {
                                const chColors = {
                                    '✨': ['rgba(60,40,10,0.92)', 'rgba(90,60,10,0.92)', '#FFD700', 'rgba(255,210,60,0.7)'],
                                    '☁️': ['rgba(10,30,60,0.92)', 'rgba(20,50,90,0.92)', '#88CCFF', 'rgba(100,180,255,0.6)'],
                                    '🌑': ['rgba(20,0,40,0.92)', 'rgba(40,0,70,0.92)', '#CC66FF', 'rgba(160,0,255,0.5)'],
                                };
                                const cc = chColors[item.icon] || chColors['✨'];
                                bg = isSelected || isHov
                                    ? `linear-gradient(135deg, ${cc[1]}, ${cc[0]})`
                                    : `linear-gradient(135deg, ${cc[0]}, rgba(10,10,20,0.88))`;
                                border = isSelected ? `2px solid ${cc[2]}` : `1px solid ${cc[3]}`;
                                shadow = isSelected
                                    ? `0 0 18px ${cc[3]}, 0 4px 10px rgba(0,0,0,0.5)`
                                    : '0 2px 6px rgba(0,0,0,0.4)';
                                textColor = isSelected ? cc[2] : '#DDD';
                            } else {
                                bg = isSelected || isHov
                                    ? 'linear-gradient(135deg, rgba(40,60,100,0.95), rgba(25,40,70,0.95))'
                                    : 'linear-gradient(135deg, rgba(15,22,40,0.88), rgba(10,16,30,0.88))';
                                border = isSelected ? '2px solid rgba(150,200,255,0.9)' : '1px solid rgba(80,120,180,0.3)';
                                shadow = isSelected
                                    ? '0 0 14px rgba(100,180,255,0.5), 0 3px 8px rgba(0,0,0,0.5)'
                                    : '0 2px 5px rgba(0,0,0,0.4)';
                                textColor = isSelected ? '#FFF' : '#BBBFD0';
                            }

                            return (
                                <button
                                    key={index}
                                    onClick={() => onSelect(index)}
                                    onMouseEnter={() => setHovered(index)}
                                    onMouseLeave={() => setHovered(null)}
                                    style={{
                                        padding: isStart ? '13px 16px' : '10px 14px',
                                        background: bg,
                                        color: textColor,
                                        border: border,
                                        borderRadius: isStart ? '12px' : '10px',
                                        fontSize: isStart ? '17px' : isChapter ? '13px' : '14px',
                                        fontWeight: 'bold',
                                        cursor: 'pointer',
                                        transition: 'all 0.12s ease',
                                        boxShadow: shadow,
                                        transform: isSelected ? 'scale(1.04)' : isHov ? 'scale(1.02)' : 'scale(1)',
                                        textAlign: 'left',
                                        outline: 'none',
                                        WebkitTapHighlightColor: 'transparent',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px',
                                        letterSpacing: '0.02em',
                                        backdropFilter: 'blur(4px)',
                                    }}
                                >
                                    <span style={{ fontSize: isStart ? '20px' : '16px', lineHeight: 1 }}>{item.icon}</span>
                                    <span style={{ flex: 1 }}>{item.label}</span>
                                    {isSelected && <span style={{ fontSize: '12px', opacity: 0.8 }}>▶</span>}
                                </button>
                            );
                        })}
                    </div>
                    <div style={{
                        marginTop: '16px', fontSize: '11px',
                        color: 'rgba(140,150,180,0.7)', textAlign: 'center',
                        letterSpacing: '0.04em'
                    }}>
                        {window.CONFIG ? window.CONFIG.VERSION : 'v1.4'}　|　↑↓ Select　Space: Confirm
                    </div>
                </div>
            );
        }

        // --- 設定メニュー コンポーネント ---
        function SettingsMenu({ onSelect, onVolumeChange, volume, onExport, onImport }) {
            const volPct = Math.round(volume * 100);

            return (
                <div style={{
                    position: 'absolute', top: 0, left: 0,
                    width: '100%', height: '100%',
                    display: 'flex', flexDirection: 'column',
                    justifyContent: 'center', alignItems: 'center',
                    pointerEvents: 'auto',
                    background: 'rgba(10, 20, 35, 0.0)',
                    paddingTop: '5vh'
                }}>
                    <h2 style={{color: '#FFD700', fontSize: '32px', marginBottom: '40px', marginTop: 0}}>⚙ 設定</h2>

                    <div style={{ width: '80%', maxWidth: '450px', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                        
                        {/* 🔊 音量スライダー */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px' }}>
                                <span style={{ color: '#FFF', fontSize: '20px', fontWeight: 'bold' }}>🔊 音量</span>
                                <span style={{ color: '#FFD700', fontSize: '18px', fontWeight: 'bold' }}>{volPct}%</span>
                            </div>
                            <input 
                                type="range" 
                                min="0" max="1" step="0.1" 
                                value={volume} 
                                onChange={(e) => onVolumeChange(parseFloat(e.target.value))}
                                style={{
                                    width: '100%',
                                    cursor: 'pointer',
                                    height: '8px',
                                    accentColor: '#4CAF50'
                                }}
                            />
                        </div>

                        {/* 💾 セーブデータ書き出し */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <div style={{ color: '#FFF', fontSize: '18px', fontWeight: 'bold', marginBottom: '5px' }}>💾 セーブ書き出し</div>
                                <div style={{ color: '#888', fontSize: '13px' }}>バックアップ用データを保存</div>
                            </div>
                            <button onClick={onExport} style={{ padding: '10px 15px', background: '#3C64A0', color: '#FFF', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold' }}>
                                保存 ▶
                            </button>
                        </div>

                        {/* 📂 セーブデータ読み込み */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <div style={{ color: '#FFF', fontSize: '18px', fontWeight: 'bold', marginBottom: '5px' }}>📂 セーブ読み込み</div>
                                <div style={{ color: '#888', fontSize: '13px' }}>バックアップから復元</div>
                            </div>
                            <button onClick={onImport} style={{ padding: '10px 15px', background: '#3C64A0', color: '#FFF', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold' }}>
                                読込 ▶
                            </button>
                        </div>

                    </div>

                    <button 
                        onClick={() => onSelect(3)} 
                        style={{
                            marginTop: '40px', padding: '12px 40px',
                            background: 'transparent', border: '2px solid #888', borderRadius: '25px',
                            color: '#FFF', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer'
                        }}
                    >
                        ← タイトルに戻る
                    </button>
                </div>
            );
        }

        // --- ステージ選択メニュー コンポーネント ---
        function StageSelectMenu({ onSelectStage, onBack, onToggleDifficulty, difficulty, stages, clearedStages, highScores, selectedStageIndex }) {
            const listRef = React.useRef(null);

            // 自動スクロール: 選択中のアイテムが画面外に出ないようにする
            useEffect(() => {
                const list = listRef.current;
                if (list) {
                    const selectedItem = list.children[selectedStageIndex];
                    if (selectedItem) {
                        const listRect = list.getBoundingClientRect();
                        const itemRect = selectedItem.getBoundingClientRect();
                        if (itemRect.bottom > listRect.bottom) {
                            list.scrollTop += (itemRect.bottom - listRect.bottom) + 10;
                        } else if (itemRect.top < listRect.top) {
                            list.scrollTop -= (listRect.top - itemRect.top) + 10;
                        }
                    }
                }
            }, [selectedStageIndex]);

            return (
                <div style={{
                    position: 'absolute', top: 0, left: 0,
                    width: '100%', height: '100%',
                    display: 'flex', flexDirection: 'column',
                    alignItems: 'center',
                    pointerEvents: 'none', // 背景は透過させてキャンバスのスワイプを有効にする
                    background: 'rgba(10, 20, 35, 0.0)',
                    paddingTop: '2vh',
                    paddingBottom: '10px'
                }}>
                    <h2 style={{
                        color: '#FFF', fontSize: '24px', // 34px -> 24px (少し小さく)
                        marginBottom: '8px', marginTop: 0, 
                        textShadow: '2px 2px 4px #000',
                        pointerEvents: 'auto'
                    }}>
                        ⚔ ステージ選択
                    </h2>

                    <div 
                        onClick={onToggleDifficulty}
                        style={{
                            background: difficulty === 'HARD' ? 'rgba(255, 100, 100, 0.3)' : difficulty === 'EASY' ? 'rgba(100, 255, 100, 0.3)' : 'rgba(255, 255, 255, 0.1)',
                            border: `2px solid ${difficulty === 'HARD' ? '#FF5252' : difficulty === 'EASY' ? '#4CAF50' : '#FFF'}`,
                            borderRadius: '16px', padding: '6px 20px', marginBottom: '10px',
                            cursor: 'pointer', color: '#FFF', fontWeight: 'bold', fontSize: '14px',
                            pointerEvents: 'auto'
                        }}
                    >
                        難易度: {difficulty} (タップで変更)
                    </div>

                    <div 
                        ref={listRef}
                        style={{
                            width: '90%', maxWidth: '500px', // 600px -> 500px
                            flex: 1,
                            overflowY: 'auto',
                            display: 'flex', flexDirection: 'column', gap: '8px', // 15px -> 8px
                            padding: '10px',
                            scrollbarWidth: 'thin', scrollbarColor: '#5BA3E6 rgba(255,255,255,0.1)',
                            pointerEvents: 'auto'
                        }}
                    >
                        {stages.map((stage, i) => {
                            const isSelected = i === selectedStageIndex;
                            const isCleared = clearedStages.includes(stage.id);
                            const hs = highScores[stage.id];
                            // ★バグ修正: hs はフレーム数(60fps)なので正しく分:秒に変換する
                            const totalSec = hs ? Math.floor(hs / 60) : 0;
                            const timeStr = hs ? `⏱ ${Math.floor(totalSec/60).toString().padStart(2,'0')}:${(totalSec%60).toString().padStart(2,'0')}` : null;
                            const isExtra = stage.isExtra;

                            let bgGrad = isSelected ? 'linear-gradient(to right, rgba(91,163,230,0.6), rgba(60,100,160,0.5))' : 'linear-gradient(to right, rgba(40,50,70,0.8), rgba(25,35,50,0.8))';
                            let borderColor = isSelected ? '#FFF' : (isCleared ? '#4CAF50' : 'rgba(100,120,160,0.3)');
                            if (isExtra) {
                                bgGrad = isSelected ? 'linear-gradient(to right, rgba(255,215,0,0.5), rgba(255,140,0,0.4))' : 'linear-gradient(to right, rgba(80,60,20,0.9), rgba(60,40,10,0.9))';
                                borderColor = isSelected ? '#FFD700' : (isCleared ? '#4CAF50' : 'rgba(255,215,0,0.3)');
                            }

                            return (
                                <div 
                                    key={stage.id}
                                    onClick={() => onSelectStage(i)}
                                    style={{
                                        background: bgGrad,
                                        border: `2px solid ${borderColor}`,
                                        borderRadius: '10px',
                                        padding: '10px 15px', // 15px -> 10px 15px
                                        cursor: 'pointer',
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                        boxShadow: isSelected ? '0 0 10px rgba(255,255,255,0.4)' : 'none',
                                        transform: isSelected ? 'scale(1.02)' : 'scale(1)',
                                        transition: 'all 0.1s'
                                    }}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                        <div style={{
                                            width: '30px', height: '30px', borderRadius: '50%', // 36px -> 30px
                                            background: isCleared ? '#4CAF50' : (isSelected ? (isExtra ? '#FFD700' : '#FFF') : '#555'),
                                            display: 'flex', justifyContent: 'center', alignItems: 'center',
                                            color: isSelected && !isCleared ? '#333' : '#FFF', fontWeight: 'bold', fontSize: isExtra ? '11px' : '15px'
                                        }}>
                                            {isExtra ? 'EX' : (i + 1)}
                                        </div>
                                        
                                        <div>
                                            <div style={{ color: isExtra ? (isSelected ? '#FFD700' : '#FFA500') : (isSelected ? '#FFF' : '#CCC'), fontSize: isSelected ? '17px' : '15px', fontWeight: 'bold'}}>
                                                {stage.name}
                                            </div>
                                            <div style={{ color: '#888', fontSize: '11px', marginTop: '2px' }}>
                                                {stage.desc}
                                            </div>
                                        </div>
                                    </div>

                                    <div style={{ textAlign: 'right' }}>
                                        {timeStr && <div style={{ color: isCleared ? '#FFD700' : '#888', fontSize: '12px', fontWeight: 'bold' }}>{timeStr}</div>}
                                        {isCleared && <div style={{ color: '#4CAF50', fontSize: '12px', fontWeight: 'bold', marginTop: '2px' }}>✅ クリア</div>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <button 
                        onClick={onBack}
                        style={{
                            marginTop: '10px', padding: '10px 30px',
                            background: 'rgba(0,0,0,0.5)', border: '2px solid #888', borderRadius: '20px',
                            color: '#FFF', fontSize: '14px', fontWeight: 'bold', cursor: 'pointer',
                            pointerEvents: 'auto'
                        }}
                    >
                        ← タイトルに戻る
                    </button>
                </div>
            );
        }

        function App() {
            const [gameState, setGameState] = useState('title');
            const [titleCursor, setTitleCursor] = useState(0);
            const [stageSelectIndex, setStageSelectIndex] = useState(0);
            // ★バグ修正: volume を React state で管理（以前は render 時の一時変数で、スライダーが元値に戻るバグあり）
            const [volume, setVolume] = useState(() => {
                return (window.game && window.game.saveData && window.game.saveData.settings)
                    ? window.game.saveData.settings.vol
                    : 0.3;
            });
            // ★第2章解放フラグ: メインステージ全クリ後にtrue
            const [allMainCleared, setAllMainCleared] = useState(false);
            const [chapter3Unlocked, setChapter3Unlocked] = useState(false);
            const [chapter4Unlocked, setChapter4Unlocked] = useState(false);
            // ★バグ修正: chapter5Unlocked が未定義だった → タッチ操作で第5章に入れないバグを修正
            const [chapter5Unlocked, setChapter5Unlocked] = useState(false);
            // ★バグ修正: ログインボーナスポップアップ表示中はメニューを非表示にする
            // canvas(背面)にポップアップを描いても React DOM(z-index:100)のメニューに隠れるバグの修正
            const [showingLoginBonus, setShowingLoginBonus] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.game) {
                        if (window.game.state !== gameState) {
                            setGameState(window.game.state);
                        }
                        if (window.game.titleCursor !== titleCursor) {
                            setTitleCursor(window.game.titleCursor);
                        }
                        if (window.game.selectedStage !== stageSelectIndex) {
                            setStageSelectIndex(window.game.selectedStage || 0);
                        }
                        // ★バグ修正: 外部からの音量変更もUIに同期する
                        const gVol = window.game.saveData && window.game.saveData.settings
                            ? window.game.saveData.settings.vol
                            : undefined;
                        if (gVol !== undefined && gVol !== volume) {
                            setVolume(gVol);
                        }
                        // ★第2章解放チェック
                        const cleared = window.STAGES_MAIN
                            ? window.STAGES_MAIN.every(s => window.game.saveData.clearedStages.includes(s.id))
                            : false;
                        if (cleared !== allMainCleared) setAllMainCleared(cleared);
                        const c3Unlocked = !!(window.game.saveData && window.game.saveData.clearedStages && window.game.saveData.clearedStages.includes('c2_boss'));
                        if (c3Unlocked !== chapter3Unlocked) setChapter3Unlocked(c3Unlocked);
                        const c4Unlocked = !!(window.game.saveData && window.game.saveData.clearedStages && window.game.saveData.clearedStages.includes('c3_boss'));
                        if (c4Unlocked !== chapter4Unlocked) setChapter4Unlocked(c4Unlocked);
                        // ★バグ修正: 第5章解放チェック（c4_bossクリア後に解放）
                        const c5Unlocked = !!(window.game.saveData && window.game.saveData.clearedStages && window.game.saveData.clearedStages.includes('c4_boss'));
                        if (c5Unlocked !== chapter5Unlocked) setChapter5Unlocked(c5Unlocked);
                        // ★バグ修正: ログインボーナス表示フラグを同期
                        // _pendingLoginBonus が truthy = canvas にポップアップ描画中 → React メニューを隠す
                        const bonusShowing = !!(window.game._pendingLoginBonus);
                        if (bonusShowing !== showingLoginBonus) setShowingLoginBonus(bonusShowing);
                    }
                }, 1000 / 60);
                return () => clearInterval(interval);
            }, [gameState, titleCursor, stageSelectIndex, volume, allMainCleared, chapter3Unlocked, chapter4Unlocked, chapter5Unlocked, showingLoginBonus]);

            function _injectKey(keyCode) {
                if (!window.game || !window.game.input) return;
                window.game.input.keys[keyCode] = true;
                window.game.input.prev[keyCode] = false;
                setTimeout(() => {
                    if (window.game && window.game.input) {
                        window.game.input.keys[keyCode] = false;
                    }
                }, 80);
            }

            const handleMenuSelect = (index) => {
                if (window.game) {
                    window.game.titleCursor = index;
                    _injectKey('Space');
                    if (window.game.sound) window.game.sound.play('confirm');
                }
            };

            const handleStageSelect = (index) => {
                if (window.game) {
                    window.game.selectedStage = index;
                    window.game.difficultySelectMode = false; // ★バグ修正: 1回タップで確定できるよう解除
                    _injectKey('Space');
                }
            };

            const handleStageBack = () => {
                if (window.game) {
                    _injectKey('KeyB');
                }
            };

            const handleToggleDifficulty = () => {
                if (window.game) {
                    // ★バグ修正: ArrowLeft固定だと難易度が一方向にしか動かない。
                    // game.js側の難易度順 EASY→NORMAL→HARD→EASY に合わせてサイクル。
                    const order = ['EASY', 'NORMAL', 'HARD'];
                    const cur = window.game.selectedDifficulty || 'NORMAL';
                    const next = order[(order.indexOf(cur) + 1) % order.length];
                    window.game.selectedDifficulty = next;
                    window.game.difficultySelectMode = false;
                    if (window.game.sound) window.game.sound.play('cursor');
                }
            };

            const handleSettingsSelect = (index) => {
                if (window.game) {
                    window.game.settingsCursor = index;
                    _injectKey('Space');
                    if (window.game.sound) window.game.sound.play('confirm');
                }
            };

            const handleVolumeChange = (vol) => {
                if (window.game && window.game.sound) {
                    // ★バグ修正①: settings が null/undefined の場合クラッシュしないよう guard
                    if (window.game.saveData && window.game.saveData.settings) {
                        window.game.saveData.settings.vol = vol;
                    }
                    window.game.sound.vol = vol;
                    if (window.SaveManager) window.SaveManager.save(window.game.saveData);
                    window.game.sound.play('cursor');
                    // ★バグ修正②: setVolume を呼ばないとスライダーが元値にスナップバックする
                    setVolume(vol);
                }
            };

            const handleExport = () => {
                if (window.game && window.SaveManager) {
                    if (window.SaveManager.exportData(window.game.saveData)) {
                        // ★バグ修正⑤: particles が初期化前の場合クラッシュしないよう guard
                        if (window.game.particles) {
                            window.game.particles.damageNum(window.CONFIG.CANVAS_WIDTH / 2, 200, '書き出し完了！', '#4CAF50');
                        }
                        if (window.game.sound) window.game.sound.play('confirm');
                    }
                }
            };

            const handleImport = () => {
                if (window.game && window.SaveManager) {
                    window.SaveManager.importData(
                        () => {
                            if (window.game.sound) window.game.sound.play('powerup');
                            if (window.confirm('セーブデータを読み込みました。ページをリロードします。')) {
                                location.reload();
                            }
                        },
                        (msg) => {
                            if (window.game.sound) window.game.sound.play('damage');
                            // ★バグ修正⑤: particles が初期化前の場合クラッシュしないよう guard
                            if (window.game.particles) {
                                window.game.particles.damageNum(window.CONFIG.CANVAS_WIDTH / 2, 200, '読み込み失敗: ' + msg, '#FF5252');
                            }
                        }
                    );
                }
            };

            let stageList = [];
            let difficulty = 'NORMAL';
            let clearedStages = [];
            let highScores = {};
            if (window.game && window.STAGES_NORMAL) {
                // ★バグ修正④: STAGES_MAIN が未定義の場合 .every() でクラッシュするのを防ぐ
                const allMainCleared = window.STAGES_MAIN
                    ? window.STAGES_MAIN.every(s => window.game.saveData.clearedStages.includes(s.id))
                    : false;
                stageList = allMainCleared ? [...window.STAGES_NORMAL, ...(window.STAGES_EX || [])] : window.STAGES_NORMAL;
                difficulty = window.game.selectedDifficulty || 'NORMAL';
                clearedStages = window.game.saveData.clearedStages || [];
                highScores = window.game.saveData.highScores || {};
            }

            return (
                <div style={{ width: '100%', height: '100%' }}>
                    {gameState === 'title' && !showingLoginBonus && (
                        <TitleMenu 
                            onSelect={handleMenuSelect} 
                            cursorIndex={titleCursor}
                            allMainCleared={allMainCleared}
                            chapter3Unlocked={chapter3Unlocked}
                            chapter4Unlocked={chapter4Unlocked}
                            chapter5Unlocked={chapter5Unlocked}
                        />
                    )}
                    {gameState === 'stage_select' && (
                        <StageSelectMenu
                            onSelectStage={handleStageSelect}
                            onBack={handleStageBack}
                            onToggleDifficulty={handleToggleDifficulty}
                            difficulty={difficulty}
                            stages={stageList}
                            clearedStages={clearedStages}
                            highScores={highScores}
                            selectedStageIndex={stageSelectIndex}
                        />
                    )}
                    {gameState === 'settings' && (
                        <SettingsMenu 
                            onSelect={handleSettingsSelect} 
                            onVolumeChange={handleVolumeChange}
                            volume={volume}
                            onExport={handleExport}
                            onImport={handleImport}
                        />
                    )}
                </div>
            );
        }

        // Reactアプリのマウント
        window.addEventListener('load', () => {
            const rootElement = document.getElementById('ui-root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        });
    </script>

    <!-- Service Worker 登録（PWA・オフライン対応） -->
    <script>
        if ((window.location.protocol === 'http:' || window.location.protocol === 'https:') && 'serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./js/sw.js')
                    .catch(() => {}); // 登録失敗は静かに無視
            });
        }
    </script>

    <div id="name-input-popup" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; align-items:center; justify-content:center; background:rgba(0,0,0,0.75);">
      <div style="background:linear-gradient(135deg,#1a1a2e,#16213e); border:2px solid #e94560; border-radius:16px; padding:36px 44px; text-align:center; box-shadow:0 0 40px rgba(233,69,96,0.4); min-width:320px;">
