<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <meta name="theme-color" content="#060610">
    <title>スライム砲車バトル ～スライム戦車隊の大冒険～</title>
    <meta name="description" content="オリジナルスライム砲車バトル！弾を拾って大砲に込めて敵戦車を撃破しよう！">
    <meta name="author" content="スライム砲車バトル制作チーム">
    <meta name="copyright" content="© 2025 スライム砲車バトル制作チーム. All Rights Reserved.">

    <!-- PWA manifest -->
    <link rel="manifest" href="js/manifest.json">

    <!-- Favicon & Apple Touch Icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- OGP canonical URL（公開時に自分のURLに変更してください） -->
    <!-- <meta property="og:url" content="https://tayu135711.github.io/popgame/"> -->

    <!-- OGP (SNSシェア用) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="⚔ スライム砲車バトル ⚔">
    <meta property="og:description" content="スライムと一緒に戦車バトル！弾を拾って大砲に込めて敵を撃破するオリジナルアクションゲーム">
    <meta property="og:image" content="ogp.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="⚔ スライム砲車バトル ⚔">
    <meta name="twitter:description" content="スライムと一緒に戦車バトル！弾を拾って大砲に込めて敵を撃破するオリジナルアクションゲーム">
    <meta name="twitter:image" content="ogp.png">

    <!-- React & Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="rotate-hint">
        <div class="icon">📱</div>
        <div>縦向きにしてプレイしてね！</div>
        <div style="font-size:0.8rem;opacity:0.6;">Please rotate your device to portrait</div>
    </div>
    
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- React UI Root -->
    <div id="ui-root" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100;"></div>

    <!-- DEBUG TOOL -->

    <script src="js/config.js?v=20"></script>
    <script src="js/input.js?v=20"></script>
    <script src="js/particles.js?v=20"></script>
    <script src="js/sound.js?v=20"></script>
    <script src="js/save.js?v=20"></script>
    <script src="js/physics.js?v=20"></script>
    <script src="js/renderer.js?v=20"></script>
    <script src="js/projectile.js?v=20"></script>
    <script src="js/ammo.js?v=20"></script>
    <script src="js/powerup.js?v=20"></script>
    <script src="js/story.js?v=20"></script>
    <script src="js/defender.js?v=20"></script>
    <script src="js/invader.js?v=20"></script>
    <script src="js/ally.js?v=20"></script>
    <script src="js/player.js?v=20"></script>
    <script src="js/tank.js?v=20"></script>
    <script src="js/battle.js?v=20"></script>
    <script src="js/stages.js?v=20"></script>
    <script src="js/ui.js?v=20"></script>
    <script src="js/touch.js?v=20"></script>
    <script src="js/game.js?v=20"></script>

    <!-- React Component -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function TitleMenu({ onSelect, cursorIndex }) {
            const menuItems = [
                'ゲーム開始', 
                'イベントステージ', 
                'デイリーミッション', 
                '図鑑', 
                'アップグレード', 
                '配合', 
                '🎨 カスタマイズ', 
                '⚙ 設定'
            ];

            return (
                <div className="react-title-container" style={{
                    position: 'absolute',
                    top: 0,
                    left: 0,
                    width: '100%',
                    height: '100%',
                    display: 'flex',
                    flexDirection: 'column',
                    justifyContent: 'center',
                    alignItems: 'center',
                    pointerEvents: 'auto',
                    paddingTop: '35vh' // 少し下にずらしてロゴとかぶらないように
                }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: '1fr',
                        gap: '6px', // 隙間を縮小
                        width: '75%',
                        maxWidth: '350px'
                    }}>
                        {menuItems.map((item, index) => (
                            <button 
                                key={index}
                                onClick={() => onSelect(index)}
                                style={{
                                    padding: '8px 12px', // ボタンの高さを小さく
                                    background: cursorIndex === index ? 'linear-gradient(to right, #FF9800, #FF5722)' : 'rgba(0, 0, 0, 0.45)', // 通常時の色を薄く
                                    color: '#FFF',
                                    border: cursorIndex === index ? '2px solid #FFF' : '1px solid rgba(255,255,255,0.2)',
                                    borderRadius: '8px',
                                    fontSize: '15px', // 文字サイズを縮小
                                    fontWeight: 'bold',
                                    cursor: 'pointer',
                                    transition: 'all 0.1s',
                                    boxShadow: cursorIndex === index ? '0 0 10px rgba(255, 152, 0, 0.8)' : '0 2px 4px rgba(0,0,0,0.3)',
                                    transform: cursorIndex === index ? 'scale(1.05)' : 'scale(1.0)',
                                    textAlign: 'center',
                                    outline: 'none',
                                    WebkitTapHighlightColor: 'transparent'
                                }}
                            >
                                {item}
                            </button>
                        ))}
                    </div>
                    <div style={{
                        marginTop: '40px',
                        fontSize: '14px',
                        color: '#AAA',
                        textAlign: 'center',
                        textShadow: '1px 1px 2px #000'
                    }}>
                        バージョン情報: {window.CONFIG ? window.CONFIG.VERSION : 'v1.4'}<br/>
                        Tap SPACE / Z to Select
                    </div>
                </div>
            );
        }

        // --- 設定メニュー コンポーネント ---
        function SettingsMenu({ onSelect, onVolumeChange, volume, onExport, onImport }) {
            const volPct = Math.round(volume * 100);

            return (
                <div style={{
                    position: 'absolute', top: 0, left: 0,
                    width: '100%', height: '100%',
                    display: 'flex', flexDirection: 'column',
                    justifyContent: 'center', alignItems: 'center',
                    pointerEvents: 'auto',
                    background: 'rgba(10, 20, 35, 0.4)', // 少し暗く
                    paddingTop: '5vh'
                }}>
                    <h2 style={{color: '#FFD700', fontSize: '32px', marginBottom: '40px', marginTop: 0}}>⚙ 設定</h2>

                    <div style={{ width: '80%', maxWidth: '450px', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                        
                        {/* 🔊 音量スライダー */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px' }}>
                                <span style={{ color: '#FFF', fontSize: '20px', fontWeight: 'bold' }}>🔊 音量</span>
                                <span style={{ color: '#FFD700', fontSize: '18px', fontWeight: 'bold' }}>{volPct}%</span>
                            </div>
                            <input 
                                type="range" 
                                min="0" max="1" step="0.1" 
                                value={volume} 
                                onChange={(e) => onVolumeChange(parseFloat(e.target.value))}
                                style={{
                                    width: '100%',
                                    cursor: 'pointer',
                                    height: '8px',
                                    accentColor: '#4CAF50' // モダンブラウザ向けスライダー色
                                }}
                            />
                        </div>

                        {/* 💾 セーブデータ書き出し */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <div style={{ color: '#FFF', fontSize: '18px', fontWeight: 'bold', marginBottom: '5px' }}>💾 セーブ書き出し</div>
                                <div style={{ color: '#888', fontSize: '13px' }}>バックアップ用データを保存</div>
                            </div>
                            <button onClick={onExport} style={{ padding: '10px 15px', background: '#3C64A0', color: '#FFF', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold' }}>
                                保存 ▶
                            </button>
                        </div>

                        {/* 📂 セーブデータ読み込み */}
                        <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <div style={{ color: '#FFF', fontSize: '18px', fontWeight: 'bold', marginBottom: '5px' }}>📂 セーブ読み込み</div>
                                <div style={{ color: '#888', fontSize: '13px' }}>バックアップから復元</div>
                            </div>
                            <button onClick={onImport} style={{ padding: '10px 15px', background: '#3C64A0', color: '#FFF', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold' }}>
                                読込 ▶
                            </button>
                        </div>

                    </div>

                    <button 
                        onClick={() => onSelect(3)} // 戻る処理
                        style={{
                            marginTop: '40px', padding: '12px 40px',
                            background: 'transparent', border: '2px solid #888', borderRadius: '25px',
                            color: '#FFF', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer'
                        }}
                    >
                        ← タイトルに戻る
                    </button>
                </div>
            );
        }

        function App() {
            const [gameState, setGameState] = useState('title');
            const [titleCursor, setTitleCursor] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.game) {
                        if (window.game.state !== gameState) {
                            setGameState(window.game.state);
                        }
                        if (window.game.titleCursor !== titleCursor) {
                            setTitleCursor(window.game.titleCursor);
                        }
                    }
                }, 1000 / 60);
                return () => clearInterval(interval);
            }, [gameState, titleCursor]);

            const handleMenuSelect = (index) => {
                if (window.game) {
                    window.game.titleCursor = index;
                    window.game.input.menuConfirm = true;
                    if (window.game.sound) window.game.sound.play('confirm');
                }
            };

            const handleSettingsSelect = (index) => {
                if (window.game) {
                    window.game.settingsCursor = index;
                    window.game.input.menuConfirm = true;
                    if (window.game.sound) window.game.sound.play('confirm');
                }
            };

            const handleVolumeChange = (vol) => {
                if (window.game && window.game.sound) {
                    window.game.saveData.settings.vol = vol;
                    window.game.sound.vol = vol;
                    if (window.SaveManager) window.SaveManager.save(window.game.saveData);
                    window.game.sound.play('cursor');
                    // 強制的に再描画させるためにダミーステート更新はReact側では不要（game.sound.volで即反映）
                }
            };

            const handleExport = () => {
                if (window.game && window.SaveManager) {
                    if (window.SaveManager.exportData(window.game.saveData)) {
                        window.game.particles.damageNum(window.CONFIG.CANVAS_WIDTH / 2, 200, '書き出し完了！', '#4CAF50');
                        if (window.game.sound) window.game.sound.play('confirm');
                    }
                }
            };

            const handleImport = () => {
                if (window.game && window.SaveManager) {
                    window.SaveManager.importData(
                        () => {
                            if (window.game.sound) window.game.sound.play('powerup');
                            if (window.confirm('セーブデータを読み込みました。ページをリロードします。')) {
                                location.reload();
                            }
                        },
                        (msg) => {
                            if (window.game.sound) window.game.sound.play('damage');
                            window.game.particles.damageNum(window.CONFIG.CANVAS_WIDTH / 2, 200, '読み込み失敗: ' + msg, '#FF5252');
                        }
                    );
                }
            };

            // Reactに同期するための現在のボリューム値
            const currentVolume = (window.game && window.game.saveData && window.game.saveData.settings) 
                                    ? window.game.saveData.settings.vol 
                                    : 0.3;

            return (
                <div style={{ width: '100%', height: '100%' }}>
                    {gameState === 'title' && (
                        <TitleMenu 
                            onSelect={handleMenuSelect} 
                            cursorIndex={titleCursor} 
                        />
                    )}
                    {gameState === 'settings' && (
                        <SettingsMenu 
                            onSelect={handleSettingsSelect} 
                            onVolumeChange={handleVolumeChange}
                            volume={currentVolume}
                            onExport={handleExport}
                            onImport={handleImport}
                        />
                    )}
                </div>
            );
        }

        window.addEventListener('load', () => {
            const rootElement = document.getElementById('ui-root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        });
    </script>
    <!-- Service Worker 登録（PWA・オフライン対応） -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./js/sw.js')
                    .catch(() => {}); // 登録失敗は静かに無視
            });
        }
    </script>
</body>

</html>
