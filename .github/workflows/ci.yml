name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ï¿½Rï¿½[ï¿½hï¿½iï¿½ï¿½ï¿½`ï¿½Fï¿½bï¿½N
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx eslint js/**/*.js --no-eslintrc -c "{\"rules\":{\"no-unused-vars\":\"warn\",\"semi\":\"warn\"}}" --rule "{}" 
        continue-on-error: true

  html-check:
    name: HTMLï¿½\ï¿½ï¿½ï¿½`ï¿½Fï¿½bï¿½N
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g htmlhint
      - run: htmlhint "**/*.html"
  backend-test:
    name: â˜• Javaãƒ†ã‚¹ãƒˆ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - run: ./mvnw test